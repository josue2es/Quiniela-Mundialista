services:
  quiniela:
    build: .
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - TZ=America/El_Salvador
      - PORT=8090
    volumes:
      - ./data/db:/data
      - ./data/storage:/app/.nicegui
      - ./players.csv:/config/players.csv:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
