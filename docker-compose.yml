services:
  quiniela:
    build: .
    ports:
      - "8091:8091"
    env_file:
      - .env
    environment:
      - TZ=America/El_Salvador
      - PORT=8091
    volumes:
      - ./data/db:/data
      - ./data/storage:/app/.nicegui
      # Carpeta de config (read-only). Poné players.csv en ./data/config/ para
      # uso real; si está vacía, el seed de jugadores se omite sin error.
      - ./data/config:/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
